services:
  - type: web
    name: isro-aqi-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEV_MODE
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
